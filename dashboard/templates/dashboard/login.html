<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FuzBoard</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}?v=5">

</head>

<body class="min-h-screen bg-cat-base text-cat-text font-mono flex items-center justify-center relative py-12">
    <!-- Background decoration -->
    <div class="absolute inset-0 bg-gradient-to-br from-cat-mauve/5 via-cat-base to-cat-pink/5"></div>
    <div class="absolute top-0 left-0 w-96 h-96 bg-cat-mauve/10 rounded-full filter blur-3xl float-animation"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-cat-pink/10 rounded-full filter blur-3xl float-animation"
        style="animation-delay: 3s;"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        <!-- Main card with glass morphism -->
        <div class="auth-card">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-cat-mantle rounded-2xl mb-4 glow-mauve">
                    <h1 class="logo">FuzBoard<span class="text-cat-pink">.</span></h1>
                </div>
                <p class="text-cat-subtext0 text-sm font-medium">Data Analysis Hub</p>
                <p class="text-cat-overlay0 text-xs mt-2">Bienvenido de vuelta</p>
            </div>

            <!-- Messages -->
            {% if messages %}
            <div class="mb-6 space-y-3">
                {% for message in messages %}
                <div
                    class="{% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %} flex items-start gap-3">
                    <svg class="w-5 h-5 mt-0.5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        {% if message.tags == 'error' %}
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        {% elif message.tags == 'success' %}
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        {% else %}
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        {% endif %}
                    </svg>
                    <span class="text-sm font-medium">{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div class="field-group">
                    <label for="{{ form.username.id_for_label }}" class="field-label">
                        Nombre de Usuario
                    </label>
                    {{ form.username }}
                </div>

                <div class="field-group">
                    <label for="{{ form.password.id_for_label }}" class="field-label">
                        Contraseña
                    </label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn-primary group">
                    <svg class="w-5 h-5 transition-transform group-hover:translate-x-1"
                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    Iniciar Sesión
                    <div
                        class="w-5 h-5 rounded-full border-2 border-current border-t-transparent spinner group-hover:hidden">
                    </div>
                    <svg class="w-5 h-5 hidden group-hover:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-cat-surface1"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-2 bg-cat-surface0 text-cat-overlay0">O</span>
                </div>
            </div>

            <!-- Register Link -->
            <div class="text-center space-y-2">
                <p class="text-cat-subtext0 text-sm">
                    ¿No tienes cuenta?
                </p>
                <a href="{% url 'register' %}" class="link-primary inline-flex items-center gap-2 text-sm">
                    <span>Crear cuenta nueva</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-cat-overlay0 text-xs">
                © 2026 FuzBoard.
            </p>
        </div>
    </div>
</body>

</html>
