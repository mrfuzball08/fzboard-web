# ============================================
# FzBoard Helm Chart - Default Values
# ============================================

# -- Number of pod replicas
replicaCount: 1

# -- Docker image configuration
image:
  repository: mrfuzball/fzboard-web
  tag: latest
  pullPolicy: IfNotPresent

# -- Service configuration
service:
  type: ClusterIP
  port: 8000

# -- Ingress configuration
ingress:
  enabled: true
  className: nginx
  hostname: fzboard.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

# -- Non-sensitive environment variables
env:
  DEBUG: "False"
  ALLOWED_HOSTS: "fzboard.local,localhost,*"
  VITE_DEV_MODE: "0"
  DATABASE_PATH: "/app/data/db.sqlite3"
  MEDIA_ROOT_PATH: "/app/data/media"

# -- Sensitive environment variables (stored as K8s Secret)
secrets:
  secretKey: "change-me-in-production"

# -- Persistent storage for SQLite DB and media uploads
persistence:
  enabled: true
  size: 1Gi
  storageClass: standard
  accessMode: ReadWriteOnce

# -- Pod resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Health check configuration
healthCheck:
  path: /login/
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
