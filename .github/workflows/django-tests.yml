name: Django Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Test Image
        run: docker build -t fzboard-web:test .

      - name: Run Django Tests
        run: |
          docker run --rm \
            -e SECRET_KEY=dummy-test-key \
            fzboard-web:test \
            python manage.py test dashboard.tests
