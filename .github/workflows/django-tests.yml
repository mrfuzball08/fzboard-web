name: Django Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create fallback .env
        run: echo "SECRET_KEY=dummy-test-key" > .env

      - name: Start Docker Compose Environment
        run: docker compose up --build -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for web container..."
          sleep 5

      - name: Run Django Tests
        run: docker compose exec -T web python manage.py test dashboard.tests

      - name: Stop Docker Compose
        if: always()
        run: docker compose down
